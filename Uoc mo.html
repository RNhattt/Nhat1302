<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ước Mơ</title>

<style>
body{
    font-family:Arial;
    background:#fdf2f8;
    padding:40px;
}

h1{
    text-align:center;
    color:#d63384;
}

form{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#d63384;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🌟 Chia Sẻ Ước Mơ Của Bạn</h1>

<form>
<label>Họ và tên:</label>
<input type="text" placeholder="Nhập tên của bạn">

<label>Ước mơ / Lời nhắn:</label>
<textarea rows="5" placeholder="Viết ước mơ của bạn..."></textarea>

<button type="submit">Gửi</button>
</form>

<div style="text-align:center;">
<a href="Trangchinh.html">⬅ Quay lại Trang Chủ</a>
</div>

</body>
</html>
